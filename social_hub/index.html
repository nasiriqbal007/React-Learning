<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <title>Social Hub</title>
  </head>
  <style>
    /* Custom styles can be added here */
    :root {
      --primary-color: #ff5a1f;
      --background-color: #edeef2;
      --border-color: #e0e2ea;
      --card-color: #ffffff;
      --card-bg: #f0f2f5;
    }
    body {
      font-family: "Inter", sans-serif;
    }
  </style>
  <body class="bg-[#EDEEF2]">
    <!-- topbar -->
    <div
      class="flex px-6 py-3 bg-(--card-color) border-b-1 border-[--border-color] items-center justify-between"
    >
      <!-- title -->
      <div>
        <h1 class="font-bold text-(--primary-color) text-xl tracking-[0.5px]">
          SocialHub
        </h1>
      </div>
      <!-- seachbar -->
      <div class="w-[260px]">
        <input
          type="text"
          placeholder="Search..."
          class="w-full bg-[#EAF3FB] py-2 pr-4 pl-9 text-[#1a3a5c] border border-[#B5D4F4] rounded-[24px] placeholder:text-[#1a3a5c] focus:bg-(--card-color) focus:ring-[#1a3a5c] hover:bg-[#dff0fb] hover:border-[#85b7eb] transition-all duration-150 outline-solid outline-1 outline-transparent focus:outline-[#1a3a5c]"
        />
      </div>
      <!-- menus -->
      <div class="flex items-center space-x-4">
        <ul class="flex space-x-4 mt-4 items-center">
          <div
            class="w-9 h-9 bg-(--card-bg) flex items-center justify-center rounded-full hover:bg-(--border-color) cursor-pointer transition-all duration-150 hover:scale-120"
          >
            <i class="fa-regular fa-home"></i>
          </div>

          <!-- User -->
          <div
            class="w-9 h-9 bg-(--card-bg) flex items-center justify-center rounded-full hover:bg-(--border-color) cursor-pointer transition-all duration-150 hover:scale-120"
          >
            <i class="fa-regular fa-user"></i>
          </div>

          <!-- Bell -->
          <div
            class="relative w-9 h-9 bg-(--card-bg) flex items-center justify-center rounded-full hover:bg-(--border-color) cursor-pointer transition-all duration-150 hover:scale-120"
          >
            <i class="fa-regular fa-bell"></i>
            <span
              class="absolute top-0 right-0 border-white border-2 text-[#FF5A1F] text-[18px] w-3 h-3 rounded-full flex items-center justify-center"
            >
              •
            </span>
          </div>

          <!-- Comment -->
          <div
            class="w-9 h-9 bg-(--card-bg) flex items-center justify-center rounded-full hover:bg-(--border-color) cursor-pointer transition-all duration-150 hover:scale-120"
          >
            <i class="fa-regular fa-comment"></i>
          </div>

          <div
            class="flex items-center justify-center bg-(--primary-color) w-9 h-9 rounded-full text-white transition-all duration-150 hover:scale-120 cursor-pointer"
          >
            <li>JD</li>
          </div>
        </ul>
      </div>
    </div>
    <!-- main content -->
    <div class="grid grid-cols-[210px_1fr_270px] px-3 py-4">
      <!-- left sidebar -->
      <div class="bg-(--card-color) rounded-lg overflow-hidden">
        <div class="py-2">
          <ul class="flex flex-col gap-1 font-semibold text-[#444]">
            <!-- Home  -->
            <li
              class="active relative flex items-center gap-3 p-2 cursor-pointer transition-all duration-150 hover:pl-3 hover:bg-[#f5f7fa] hover:text-(--primary-color) [&.active]:pl-3 [&.active]:bg-red-50 [&.active]:text-(--primary-color) after:absolute after:left-[-16px] after:top-0 after:bottom-0 after:w-[3px] after:bg-transparent after:transition-all hover:after:bg-(--primary-color) [&.active]:after:bg-(--primary-color) bg-opacity-10 bg-(--primary-color)"
            >
              <i class="fa-regular fa-home w-5 text-center"></i> Home
            </li>

            <!-- Explore -->
            <li
              class="relative flex items-center gap-3 p-2 cursor-pointer transition-all duration-150 hover:pl-3 hover:bg-[#f5f7fa] hover:text-(--primary-color) [&.active]:pl-3 [&.active]:bg-[#f5f7fa] [&.active]:text-(--primary-color) after:absolute after:left-[-16px] after:top-0 after:bottom-0 after:w-[3px] after:bg-transparent after:transition-all hover:after:bg-(--primary-color) [&.active]:after:bg-(--primary-color)"
            >
              <i class="fa-regular fa-compass w-5 text-center"></i> Explore
            </li>

            <!-- Reels -->
            <li
              class="relative flex items-center gap-3 p-2 cursor-pointer transition-all duration-150 hover:pl-3 hover:bg-[#f5f7fa] hover:text-(--primary-color) [&.active]:pl-3 [&.active]:bg-[#f5f7fa] [&.active]:text-(--primary-color) after:absolute after:left-[-16px] after:top-0 after:bottom-0 after:w-[3px] after:bg-transparent after:transition-all hover:after:bg-(--primary-color) [&.active]:after:bg-(--primary-color)"
            >
              <i class="fa-regular fa-film w-5 text-center"></i> Reels
            </li>

            <!-- Liked Posts -->
            <li
              class="relative flex items-center gap-3 p-2 cursor-pointer transition-all duration-150 hover:pl-3 hover:bg-[#f5f7fa] hover:text-(--primary-color) [&.active]:pl-3 [&.active]:bg-[#f5f7fa] [&.active]:text-(--primary-color) after:absolute after:left-[-16px] after:top-0 after:bottom-0 after:w-[3px] after:bg-transparent after:transition-all hover:after:bg-(--primary-color) [&.active]:after:bg-(--primary-color)"
            >
              <i class="fa-regular fa-heart w-5 text-center"></i> Liked Posts
            </li>

            <!-- Saved -->
            <li
              class="relative flex items-center gap-3 p-2 cursor-pointer transition-all duration-150 hover:pl-3 hover:bg-[#f5f7fa] hover:text-(--primary-color) [&.active]:pl-3 [&.active]:bg-[#f5f7fa] [&.active]:text-(--primary-color) after:absolute after:left-[-16px] after:top-0 after:bottom-0 after:w-[3px] after:bg-transparent after:transition-all hover:after:bg-(--primary-color) [&.active]:after:bg-(--primary-color)"
            >
              <i class="fa-regular fa-bookmark w-5 text-center"></i> Saved
            </li>

            <!-- Events -->
            <li
              class="relative flex items-center gap-3 p-2 cursor-pointer transition-all duration-150 hover:pl-3 hover:bg-[#f5f7fa] hover:text-(--primary-color) [&.active]:pl-3 [&.active]:bg-[#f5f7fa] [&.active]:text-(--primary-color) after:absolute after:left-[-16px] after:top-0 after:bottom-0 after:w-[3px] after:bg-transparent after:transition-all hover:after:bg-(--primary-color) [&.active]:after:bg-(--primary-color)"
            >
              <i class="fa-regular fa-calendar w-5 text-center"></i> Events
            </li>

            <!-- Settings -->
            <li
              class="relative flex items-center gap-3 p-2 cursor-pointer transition-all duration-150 hover:pl-3 hover:bg-[#f5f7fa] hover:text-(--primary-color) [&.active]:pl-3 [&.active]:bg-[#f5f7fa] [&.active]:text-(--primary-color) after:absolute after:left-[-16px] after:top-0 after:bottom-0 after:w-[3px] after:bg-transparent after:transition-all hover:after:bg-(--primary-color) [&.active]:after:bg-(--primary-color)"
            >
              <i class="fa-regular fa-gear w-5 text-center"></i> Settings
            </li>
          </ul>
        </div>
      </div>
      <!-- main feed -->
      <div>
        <h2 class="font-bold text-lg mb-2">main side</h2>
      </div>
      <!-- right sidebar -->
      <div>
        <h2 class="font-bold text-lg mb-2">right side</h2>
      </div>
    </div>
  </body>
</html>
